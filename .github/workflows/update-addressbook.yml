---
name: Update i2pd addressbook

"on":
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: write

concurrency:
  group: update-i2pd-addressbook
  cancel-in-progress: false

jobs:
  update-addressbook:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Install i2pd
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            i2pd \
            ca-certificates \
            curl

      - name: Fetch hosts from i2pd subscriptions and rebuild addressbook
        shell: bash
        run: |
          set -Eeuo pipefail

          conf_file="i2pd/i2pd.conf"
          datadir="${RUNNER_TEMP}/i2pd-data"
          pidfile="${datadir}/i2pd.pid"
          tmp_hosts_dir="${RUNNER_TEMP}/hosts"

          mkdir -p "${datadir}/destinations" "${tmp_hosts_dir}"
          chmod -R u+rwX "${datadir}"

          cleanup() {
            if [[ -f "${pidfile}" ]]; then
              kill "$(cat "${pidfile}")" || true
            fi
          }
          trap cleanup EXIT

          i2pd \
            --conf="${conf_file}" \
            --datadir="${datadir}" \
            --pidfile="${pidfile}" \
            >"${RUNNER_TEMP}/i2pd.log" 2>&1 &

          proxy_ready=0
          for _ in {1..45}; do
            if curl --silent --show-error --fail --max-time 5 \
              --proxy "http://127.0.0.1:4444" \
              "http://i2p-projekt.i2p/hosts.txt" >/dev/null 2>&1; then
              proxy_ready=1
              break
            fi
            if [[ -f "${pidfile}" ]] && ! kill -0 "$(cat "${pidfile}")" 2>/dev/null; then
              echo "i2pd exited before proxy became ready" >&2
              tail -n 200 "${RUNNER_TEMP}/i2pd.log" >&2 || true
              exit 1
            fi
            sleep 10
          done

          if [[ "${proxy_ready}" -ne 1 ]]; then
            echo "i2pd proxy did not become ready in time" >&2
            tail -n 200 "${RUNNER_TEMP}/i2pd.log" >&2 || true
            exit 1
          fi

          python3 - <<'PY'
          import os
          import pathlib
          import re

          conf_path = pathlib.Path("i2pd/i2pd.conf")
          tmp_hosts_dir = pathlib.Path(os.environ["RUNNER_TEMP"]) / "hosts"

          conf_text = conf_path.read_text(encoding="utf-8")

          def read_option(name: str) -> str:
              pattern = re.compile(
                  rf"^\s*{re.escape(name)}\s*=\s*(.+?)\s*$",
                  re.MULTILINE,
              )
              match = pattern.search(conf_text)
              if not match:
                  return ""
              return match.group(1).split("#", 1)[0].strip()

          urls = []
          defaulturl = read_option("defaulturl")
          if defaulturl:
              urls.append(defaulturl)
          subscriptions = read_option("subscriptions")
          if subscriptions:
              urls.extend(
                  part.strip() for part in subscriptions.split(",")
                  if part.strip()
              )

          if not urls:
              raise SystemExit("No addressbook URLs found in i2pd.conf")

          tmp_hosts_dir.mkdir(parents=True, exist_ok=True)
          (tmp_hosts_dir / "urls.txt").write_text(
              "\n".join(urls) + "\n",
              encoding="utf-8",
          )
          PY

          mapfile -t urls < "${RUNNER_TEMP}/hosts/urls.txt"
          success_count=0
          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            out="${RUNNER_TEMP}/hosts/hosts-${index}.txt"
            if curl --silent --show-error --fail --location \
              --retry 2 --retry-delay 3 --max-time 60 \
              --proxy "http://127.0.0.1:4444" "${url}" -o "${out}"; then
              success_count=$((success_count + 1))
            fi
          done

          if [[ "${success_count}" -eq 0 ]]; then
            echo "No addressbook source could be fetched via i2pd proxy" >&2
            exit 1
          fi

          python3 - <<'PY'
          import os
          import pathlib

          output_path = pathlib.Path("i2pd/addressbook/addresses.csv")
          tmp_hosts_dir = pathlib.Path(os.environ["RUNNER_TEMP"]) / "hosts"

          entries = {}
          if output_path.exists():
              for raw in output_path.read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  sep = "," if "," in line else "=" if "=" in line else None
                  if not sep:
                      continue
                  host, dest = line.split(sep, 1)
                  host = host.strip().lower()
                  dest = dest.strip()
                  if host and dest:
                      entries[host] = dest

          for hosts_file in sorted(tmp_hosts_dir.glob("hosts-*.txt")):
              for raw in hosts_file.read_text(
                  encoding="utf-8", errors="ignore"
              ).splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  sep = "=" if "=" in line else "," if "," in line else None
                  if not sep:
                      continue
                  host, dest = line.split(sep, 1)
                  host = host.strip().lower()
                  dest = dest.strip()
                  if host and dest:
                      entries[host] = dest

          output = "\n".join(
              f"{host},{entries[host]}" for host in sorted(entries)
          )
          output_path.write_text(output + "\n", encoding="utf-8")
          PY

      - name: Commit and push if addressbook changed
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          if git diff --quiet -- i2pd/addressbook/addresses.csv; then
            echo "No addressbook changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add i2pd/addressbook/addresses.csv
          git commit -m "chore(addressbook): update i2pd domain database"
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com"
          remote_url="${remote_url}/${GITHUB_REPOSITORY}.git"
          git push \
            "${remote_url}" \
            "HEAD:${GITHUB_REF_NAME}"
